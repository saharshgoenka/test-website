{% extends 'base.html' %}

{% block title %}{{ post['title'] }}{% endblock %}

{% block content %}
<div class="card">
    <h1>{{ post['title'] }}</h1>
    <div class="meta">by {{ post['author_name'] }} &middot; {{ post['created_at'] }}</div>
    <p class="mt-1">{{ post['content'] }}</p>

    {% if user and user['id'] == post['author_id'] %}
    <form method="POST" action="{{ url_for('delete_post_route', post_id=post['id']) }}" style="margin-top: 1.5rem;"
        onsubmit="return confirm('Are you sure you want to delete this post?');">
        <button type="submit" class="btn btn-danger btn-sm">Delete Post</button>
    </form>
    {% endif %}
</div>

<a href="{{ url_for('index') }}">&larr; Back to all posts</a>
{% endblock %}
